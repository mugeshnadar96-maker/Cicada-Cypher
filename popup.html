<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Analyzer</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --surface:      #1a1d27;
      --border:       #2a2d3a;
      --accent:       #6c63ff;
      --accent-glow:  rgba(108, 99, 255, 0.18);
      --text:         #e8eaf0;
      --text-muted:   #6b7280;
      --good:         #22c55e;
      --good-bg:      rgba(34, 197, 94, 0.12);
      --bad:          #f87171;
      --bad-bg:       rgba(248, 113, 113, 0.12);
      --neutral:      #facc15;
      --neutral-bg:   rgba(250, 204, 21, 0.12);
      --info:         #60a5fa;
      --info-bg:      rgba(96, 165, 250, 0.1);
      --radius:       10px;
      --font:         'DM Sans', 'Segoe UI', sans-serif;
      --font-mono:    'JetBrains Mono', 'Fira Code', monospace;
    }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    body {
      width: 360px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header__icon {
      width: 28px;
      height: 28px;
      background: var(--accent-glow);
      border: 1px solid var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header__title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header__subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Body ──────────────────────────────────────────────────────────────── */
    .body {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Button ────────────────────────────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }

    .btn:disabled,
    .btn--loading {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Product meta ──────────────────────────────────────────────────────── */
    #productMeta {
      font-size: 11.5px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      font-family: var(--font-mono);
      word-break: break-word;
    }

    /* ── Status ────────────────────────────────────────────────────────────── */
    .status {
      font-size: 12px;
      border-radius: 7px;
      padding: 8px 10px;
    }

    .status--info  { color: var(--info); background: var(--info-bg); }
    .status--error { color: var(--bad);  background: var(--bad-bg);  }

    /* ── Results card ──────────────────────────────────────────────────────── */
    .results {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.25s, transform 0.25s;
    }

    .results--visible {
      opacity: 1;
      transform: translateY(0);
    }

    .results__title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Fields ────────────────────────────────────────────────────────────── */
    .fields { display: flex; flex-direction: column; }

    .field {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
    }

    .field:last-child { border-bottom: none; }

    .field--block {
      flex-direction: column;
      gap: 4px;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .value {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text);
      text-align: right;
      word-break: break-word;
    }

    /* Price values use monospace */
    .value--price {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* Color-coded label badge */
    .value--good    { color: var(--good);    background: var(--good-bg);    border-radius: 5px; padding: 2px 8px; }
    .value--bad     { color: var(--bad);     background: var(--bad-bg);     border-radius: 5px; padding: 2px 8px; }
    .value--neutral { color: var(--neutral); background: var(--neutral-bg); border-radius: 5px; padding: 2px 8px; }

    /* Reason & Suggestion are full-width blocks */
    .value--block {
      text-align: left;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ── Footer ────────────────────────────────────────────────────────────── */
    .footer {
      padding: 8px 18px 12px;
      font-size: 10.5px;
      color: var(--text-muted);
      text-align: center;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header__icon">🔍</div>
    <div>
      <div class="header__title">Price Analyzer</div>
      <div class="header__subtitle">E-commerce price intelligence</div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- CTA Button -->
    <button class="btn" id="analyzeBtn">Analyze Price</button>

    <!-- Extracted product meta -->
    <div id="productMeta" hidden></div>

    <!-- Status / error messages -->
    <div class="status" id="status" hidden></div>

    <!-- API Results -->
    <div class="results" id="results" hidden>
      <div class="results__title">Analysis Result</div>
      <div class="fields">

        <div class="field">
          <span class="label">Your Price</span>
          <span class="value value--price" id="field-user_price">—</span>
        </div>

        <div class="field">
          <span class="label">Best Price</span>
          <span class="value value--price" id="field-best_price">—</span>
        </div>

        <div class="field">
          <span class="label">Verdict</span>
          <span class="value" id="field-label">—</span>
        </div>

        <div class="field field--block">
          <span class="label">Reason</span>
          <span class="value value--block" id="field-reason">—</span>
        </div>

        <div class="field field--block">
          <span class="label">Suggestion</span>
          <span class="value value--block" id="field-suggestion">—</span>
        </div>

      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">Connected to localhost:8000</div>

  <script src="popup.js"></script>
</body>
</html>
